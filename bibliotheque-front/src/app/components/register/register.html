<div class="register-container">
  <h2>Inscription</h2>
  <form (ngSubmit)="onRegister()">
    <div class="form-group">
      <label for="nom">Nom :</label>
      <input type="text" id="nom" [(ngModel)]="registerData.nom" name="nom" required>
    </div>
    <div class="form-group">
      <label for="email">Email :</label>
      <input type="email" id="email" [(ngModel)]="registerData.email" name="email" required>
    </div>
    <div class="form-group">
      <label for="password">Mot de passe :</label>
      <input type="password" id="password" [(ngModel)]="registerData.password" name="password" required>
    </div>
    <button type="submit" [disabled]="isLoading">
      <span *ngIf="isLoading" class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
      S'inscrire
    </button>
    <div *ngIf="errorMessage" class="error-message">{{ errorMessage }}</div>
  </form>
  <p>Déjà un compte ? <a routerLink="/login">Connectez-vous ici</a></p>
</div>
